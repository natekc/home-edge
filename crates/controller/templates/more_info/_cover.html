<div class="mi-header">
  <svg class="mi-icon"><use href="#icon-{{ entity.icon_name }}"/></svg>
  <div>
    <div class="mi-name">{{ entity.display_name }}</div>
    <div class="mi-state">{{ entity.value }}</div>
  </div>
</div>
<div class="mi-controls">
  <div class="mi-row mi-row--buttons">
    <button class="mi-action-btn"
            hx-post="/ui/services/cover/open_cover"
            hx-vals='{"entity_id": "{{ entity.entity_id }}"}'
            hx-swap="none"
            hx-on::after-request="document.getElementById('more-info-dialog').close(); htmx.trigger(document.getElementById('area-cards'),'refresh')">
      <svg><use href="#icon-window-shutter-open"/></svg> Open
    </button>
    <button class="mi-action-btn mi-action-btn--neutral"
            hx-post="/ui/services/cover/stop_cover"
            hx-vals='{"entity_id": "{{ entity.entity_id }}"}'
            hx-swap="none">
      Stop
    </button>
    <button class="mi-action-btn"
            hx-post="/ui/services/cover/close_cover"
            hx-vals='{"entity_id": "{{ entity.entity_id }}"}'
            hx-swap="none"
            hx-on::after-request="document.getElementById('more-info-dialog').close(); htmx.trigger(document.getElementById('area-cards'),'refresh')">
      <svg><use href="#icon-window-shutter"/></svg> Close
    </button>
  </div>
  <div class="mi-row mi-row--slider">
    <span class="mi-label">Position</span>
    <input class="mi-slider" type="range" name="position" min="0" max="100"
           value="{{ entity.current_position | default(0) }}"
           hx-post="/ui/services/cover/set_cover_position"
           hx-vals='{"entity_id": "{{ entity.entity_id }}"}'
           hx-swap="none"
           hx-trigger="change"
           hx-on::after-request="htmx.trigger(document.getElementById('area-cards'),'refresh')">
    <span class="mi-slider-val">{{ entity.current_position | default(0) }}%</span>
  </div>
</div>
<script>
(function(){
  document.querySelectorAll('.mi-row--slider .mi-slider').forEach(function(slider){
    slider.addEventListener('input', function(){
      this.closest('.mi-row--slider').querySelector('.mi-slider-val').textContent = this.value + '%';
    });
  });
})();
</script>
