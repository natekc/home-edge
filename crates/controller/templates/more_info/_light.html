<div class="mi-header">
  <svg class="mi-icon"><use href="#icon-lightbulb"/></svg>
  <div>
    <div class="mi-name">{{ entity.display_name }}</div>
    <div class="mi-state mi-state--{{ entity.value }}">{{ entity.value }}</div>
  </div>
</div>
<div class="mi-controls">
  <input type="hidden" name="entity_id" value="{{ entity.entity_id }}">
  <div class="mi-row">
    <span class="mi-label">Power</span>
    <button class="mi-toggle{% if entity.value == 'on' %} mi-toggle--on{% endif %}"
            hx-post="/ui/services/light/toggle"
            hx-vals='{"entity_id": "{{ entity.entity_id }}"}'
            hx-swap="none"
            hx-on::after-request="document.getElementById('more-info-dialog').close(); htmx.trigger(document.getElementById('area-cards'),'refresh')">
      <span class="mi-toggle-thumb"></span>
    </button>
  </div>
  {% if entity.brightness is not none %}
  <div class="mi-row mi-row--slider">
    <span class="mi-label">Brightness</span>
    <input class="mi-slider" type="range" name="brightness" min="0" max="255"
           value="{{ entity.brightness }}"
           hx-post="/ui/services/light/turn_on"
           hx-include="closest .mi-controls"
           hx-swap="none"
           hx-trigger="change"
           hx-on::after-request="htmx.trigger(document.getElementById('area-cards'),'refresh')"
           oninput="this.closest('.mi-row--slider').querySelector('.mi-slider-val').textContent=Math.round(this.value*100/255)+'%'">
    <span class="mi-slider-val">{{ entity.brightness * 100 // 255 }}%</span>
  </div>
  {% endif %}
  {% if entity.color_temp_kelvin %}
  <div class="mi-row mi-row--slider">
    <span class="mi-label">Color temp</span>
    <input class="mi-slider mi-ct-slider" type="range" name="color_temp_kelvin"
           min="{{ entity.min_color_temp_kelvin }}" max="{{ entity.max_color_temp_kelvin }}"
           value="{{ entity.color_temp_kelvin }}"
           style="background:linear-gradient(to right,#ffb347,#fff8e7,#d4eeff)"
           hx-post="/ui/services/light/turn_on"
           hx-include="closest .mi-controls"
           hx-swap="none"
           hx-trigger="change"
           hx-on::after-request="htmx.trigger(document.getElementById('area-cards'),'refresh')"
           oninput="this.closest('.mi-row--slider').querySelector('.mi-slider-val').textContent=this.value+'K'">
    <span class="mi-slider-val">{{ entity.color_temp_kelvin }}K</span>
  </div>
  {% endif %}
</div>
