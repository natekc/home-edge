{% extends "_base_app.html" %}
{% block content %}
<div class="page-header">
  <h1>System</h1>
  <p>System information and controls.</p>
</div>
<div class="page-body">

  <div class="ha-card" style="margin-bottom:16px">
    <div class="ha-card-header"><h2>About</h2></div>
    <div class="ha-card-body" style="padding:0">
      <table style="width:100%;border-collapse:collapse">
        <tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:10px 16px;width:40%">Version</th>
          <td style="padding:10px 16px"><code>{{ version }}</code></td>
        </tr>
        <tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:10px 16px">Transport</th>
          <td style="padding:10px 16px">{{ transport }}</td>
        </tr>
        <tr>
          <th style="text-align:left;padding:10px 16px">Runtime mode</th>
          <td style="padding:10px 16px">{{ runtime_mode }}</td>
        </tr>
      </table>
    </div>
  </div>

  <div class="ha-card">
    <div class="ha-card-header" style="color:var(--error,#e74c3c)"><h2>Restart</h2></div>
    <div class="ha-card-body">
      <p class="text-muted" style="margin:0 0 14px">Restart the home-edge controller process.</p>
      <button class="btn btn-secondary" onclick="showToast('Restart not yet implemented.', 3000)">Restart</button>
    </div>
  </div>

</div>
{% endblock %}
