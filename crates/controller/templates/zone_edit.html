{% extends "_base_app.html" %}
{% block content %}
<div class="page-header">
  <div class="breadcrumb">
    <a href="/settings">Settings</a>
    <span class="breadcrumb-sep">›</span>
    <a href="/areas">Areas, labels &amp; zones</a>
    <span class="breadcrumb-sep">›</span>
    <span>{{ zone.name }}</span>
  </div>
  <h1>Edit Zone</h1>
  <p class="text-muted">zone.{{ zone.zone_id }}</p>
</div>

<div class="page-body">
  <div class="ha-card">
    <div class="ha-card-header"><h2>Zone Settings</h2></div>
    <div class="ha-card-body">

      {% if saved %}
      <div style="background:#dcfce7;color:#166534;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.88rem">
        ✓ Changes saved
      </div>
      {% endif %}

      <form method="post" action="/zones/{{ zone.zone_id }}">

        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" name="name" class="form-control"
                 value="{{ zone.name }}" required maxlength="64">
        </div>

        <div class="form-group">
          <label for="icon">Icon (MDI)</label>
          <input id="icon" name="icon" class="form-control"
                 value="{{ zone.icon | default('', true) }}"
                 placeholder="e.g. mdi:briefcase — leave blank to clear">
        </div>

        <div class="form-group">
          <label for="latitude">Latitude</label>
          <input id="latitude" name="latitude" type="number" step="0.000001"
                 min="-90" max="90"
                 class="form-control"
                 value="{{ zone.latitude | default('', true) }}"
                 placeholder="e.g. 51.5074 — leave blank to leave unchanged">
        </div>

        <div class="form-group">
          <label for="longitude">Longitude</label>
          <input id="longitude" name="longitude" type="number" step="0.000001"
                 min="-180" max="180"
                 class="form-control"
                 value="{{ zone.longitude | default('', true) }}"
                 placeholder="e.g. -0.1278 — leave blank to leave unchanged">
        </div>

        <div class="form-group">
          <label for="radius">Radius (metres)</label>
          <input id="radius" name="radius" type="number" step="1" min="1"
                 class="form-control"
                 value="{{ zone.radius }}"
                 placeholder="e.g. 100 — leave blank to keep current value">
        </div>

        <div class="form-group">
          <div style="display:flex;align-items:center;gap:12px;cursor:pointer">
            <label class="toggle" style="margin:0">
              <input type="checkbox" name="passive" value="true" {% if zone.passive %}checked{% endif %}>
              <span class="toggle-slider"></span>
            </label>
            <div>
              <div style="font-weight:600;font-size:.9rem">Passive</div>
              <div class="text-muted">Exclude from location tracking notifications</div>
            </div>
          </div>
        </div>

        <div style="display:flex;gap:10px;margin-top:8px">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="/areas" class="btn btn-secondary">Cancel</a>
        </div>
      </form>

    </div>
  </div>
</div>
{% endblock %}
