{% extends "_base_app.html" %}
{% block content %}
<div class="page-header">
  <h1>Settings</h1>
</div>

<div class="page-body">
  <div class="ha-card">
    <div class="settings-list">

      <a href="/devices" class="settings-row">
        <div class="settings-row-icon" style="background:#1565c0">
          <svg><use href="#icon-devices"/></svg>
        </div>
        <div class="settings-row-text">
          <div class="settings-row-title">Devices &amp; services</div>
          <div class="settings-row-sub">Connected companion devices</div>
        </div>
        <div class="settings-row-chevron">›</div>
      </a>

      <a href="/areas" class="settings-row">
        <div class="settings-row-icon" style="background:#e65100">
          <svg><use href="#icon-home"/></svg>
        </div>
        <div class="settings-row-text">
          <div class="settings-row-title">Areas, labels &amp; zones</div>
          <div class="settings-row-sub">Manage locations in your home</div>
        </div>
        <div class="settings-row-chevron">›</div>
      </a>

      <button type="button" class="settings-row" onclick="openNativeSettings()" style="border:none;width:100%;text-align:left;font:inherit">
        <div class="settings-row-icon" style="background:#6a1b9a">
          <svg><use href="#icon-cellphone-cog"/></svg>
        </div>
        <div class="settings-row-text">
          <div class="settings-row-title">Companion app</div>
          <div class="settings-row-sub">Location and notifications</div>
        </div>
        <div class="settings-row-chevron">›</div>
      </button>

      <a href="/profile" class="settings-row">
        <div class="settings-row-icon" style="background:#00695c">
          <svg><use href="#icon-user"/></svg>
        </div>
        <div class="settings-row-text">
          <div class="settings-row-title">People</div>
          <div class="settings-row-sub">Manage who can access your home</div>
        </div>
        <div class="settings-row-chevron">›</div>
      </a>

      <a href="/system" class="settings-row">
        <div class="settings-row-icon" style="background:#37474f">
          <svg><use href="#icon-settings"/></svg>
        </div>
        <div class="settings-row-text">
          <div class="settings-row-title">System</div>
          <div class="settings-row-sub">Version, transport, and restart</div>
        </div>
        <div class="settings-row-chevron">›</div>
      </a>

    </div>
  </div>
</div>
{% endblock %}
