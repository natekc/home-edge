[alias]
# `cargo xtask <cmd>` runs the xtask crate as a build/deployment script.
# See xtask/src/main.rs for available commands and --help for each.
xtask = "run --package xtask --"

[build]
target-dir = "target"

[alias]
xtask = "run --package xtask --"

# ---------------------------------------------------------------------------
# Cross-compilation linker configuration
#
# Install the appropriate toolchain for your target before building.
# All toolchains below are available via the messense/macos-cross-toolchains
# Homebrew tap (https://github.com/messense/homebrew-macos-cross-toolchains):
#
#   brew tap messense/macos-cross-toolchains
#   brew install <formula>
#
# On Linux, install the matching binutils/gcc cross package from your distro
# (e.g. `apt install gcc-arm-linux-gnueabihf`) — the system linker is then
# used automatically and no explicit linker entry is needed here.
#
# Target quick-reference:
#   arm-unknown-linux-gnueabihf   — ARMv6+, hard-float ABI (Pi Zero W, Pi 1)
#   armv7-unknown-linux-gnueabihf — ARMv7, hard-float ABI  (Pi 2/3/4 32-bit)
#   aarch64-unknown-linux-gnu     — ARM64 / AArch64         (Pi 3/4/5 64-bit)
#   riscv64gc-unknown-linux-gnu   — RISC-V 64-bit
#
# Build command:
#   cargo build --release --target <triple> -p home-edge
# ---------------------------------------------------------------------------

# Raspberry Pi Zero W / Pi 1 — ARMv6 hard-float
# brew install messense/macos-cross-toolchains/arm-unknown-linux-gnueabihf
[target.arm-unknown-linux-gnueabihf]
linker = "arm-unknown-linux-gnueabihf-gcc"

# Raspberry Pi 2/3/4 32-bit — ARMv7 hard-float
# brew install messense/macos-cross-toolchains/armv7-unknown-linux-gnueabihf
[target.armv7-unknown-linux-gnueabihf]
linker = "armv7-unknown-linux-gnueabihf-gcc"

# Raspberry Pi 3/4/5 64-bit — AArch64
# brew install messense/macos-cross-toolchains/aarch64-unknown-linux-gnu
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-unknown-linux-gnu-gcc"

# RISC-V 64-bit
# brew install messense/macos-cross-toolchains/riscv64gc-unknown-linux-gnu
[target.riscv64gc-unknown-linux-gnu]
linker = "riscv64gc-unknown-linux-gnu-gcc"

[env]
RUSTFLAGS = "-C debuginfo=0"
