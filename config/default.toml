[server]
host = "0.0.0.0"
port = 8124
# Log level filter.  Accepts RUST_LOG-style values, e.g. "info", "debug",
# "home_edge=debug,tower_http=warn".  RUST_LOG env var takes precedence.
# log_level = "info"

[storage]
data_dir = "/var/lib/home-edge"

[ui]
product_name = "Home Edge"

[areas]
names = ["Living Room", "Kitchen", "Bedroom"]

# Pre-configure the home zone coordinates (optional).
# These values seed OnboardingState on first boot only — once onboarding
# sets coordinates, this section is ignored, just like [areas].names.
#
# [home_zone]
# latitude  = 51.5074
# longitude = -0.1278
# radius    = 100.0

# History ring-buffer settings.
# capacity: maximum sensor readings retained per entity (oldest evicted first).
# [history]
# capacity = 1000

# mDNS / Zeroconf advertisement settings.
# exclude_interfaces: interface name *prefixes* to skip when building the list
# of addresses advertised via mDNS.  Run with RUST_LOG=debug to see every
# interface that is found and whether it is announced or excluded.
#
# Default excludes USB tethering/gadget interfaces (usb*, rndis*, ncm*) which
# provide internet access but are not reachable by LAN clients.
# Set to an empty list to announce on all non-loopback interfaces:
#   exclude_interfaces = []
#
[mdns]
exclude_interfaces = ["usb", "rndis", "ncm"]
