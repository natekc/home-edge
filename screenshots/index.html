<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Edge — Screenshot Gallery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #111; color: #eee; padding: 1rem; }
  h1 { margin-bottom: 1rem; font-size: 1.25rem; color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .card { background: #1e1e1e; border-radius: 8px; overflow: hidden; }
  .label { padding: .5rem .75rem; font-size: .8rem; color: #aaa; white-space: nowrap;
           overflow: hidden; text-overflow: ellipsis; }
  .card img { width: 100%; display: block; }
  .card.error { border: 1px solid #c0392b; }
  .card .err { padding: .5rem .75rem; font-size: .75rem; color: #e74c3c; }
</style>
</head>
<body>
<h1>Home Edge — Mobile Screenshot Gallery (390 × 844)</h1>
<div class="grid">

        <div class="card">
          <div class="label">Dashboard</div>
          <a href="dashboard.png" target="_blank">
            <img src="dashboard.png" alt="Dashboard" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Areas</div>
          <a href="areas.png" target="_blank">
            <img src="areas.png" alt="Areas" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">History</div>
          <a href="history.png" target="_blank">
            <img src="history.png" alt="History" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Logbook</div>
          <a href="logbook.png" target="_blank">
            <img src="logbook.png" alt="Logbook" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Devices</div>
          <a href="devices.png" target="_blank">
            <img src="devices.png" alt="Devices" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Notifications</div>
          <a href="notifications.png" target="_blank">
            <img src="notifications.png" alt="Notifications" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Zigbee Devices</div>
          <a href="zigbee-devices.png" target="_blank">
            <img src="zigbee-devices.png" alt="Zigbee Devices" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Zigbee Sensor Detail</div>
          <a href="zigbee-sensor-detail.png" target="_blank">
            <img src="zigbee-sensor-detail.png" alt="Zigbee Sensor Detail" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Zigbee Entity Edit</div>
          <a href="zigbee-entity-edit.png" target="_blank">
            <img src="zigbee-entity-edit.png" alt="Zigbee Entity Edit" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Zigbee Bulb Detail</div>
          <a href="zigbee-bulb-detail.png" target="_blank">
            <img src="zigbee-bulb-detail.png" alt="Zigbee Bulb Detail" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Settings</div>
          <a href="settings.png" target="_blank">
            <img src="settings.png" alt="Settings" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Settings – Users</div>
          <a href="settings-users.png" target="_blank">
            <img src="settings-users.png" alt="Settings – Users" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Profile</div>
          <a href="profile.png" target="_blank">
            <img src="profile.png" alt="Profile" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">System</div>
          <a href="system.png" target="_blank">
            <img src="system.png" alt="System" loading="lazy">
          </a>
        </div>

        <div class="card">
          <div class="label">Developer Tools</div>
          <a href="developer-tools.png" target="_blank">
            <img src="developer-tools.png" alt="Developer Tools" loading="lazy">
          </a>
        </div>
</div>
</body>
</html>
